<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaguar Convertible Top Repair | Price Guarantee</title>
    <style>
        :root {
            --brand-yellow: #FFD700;
            --brand-black: #000000;
            --brand-white: #FFFFFF;
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-main);
            background-color: var(--brand-black);
            color: var(--brand-white);
            line-height: 1.4;
            overflow-x: hidden;
        }

        /* BANNER SECTION */
        .top-banner {
            background-color: var(--brand-yellow);
            color: var(--brand-black);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .banner-text { font-size: 1.2rem; }

        .banner-phone {
            background: var(--brand-black);
            color: var(--brand-yellow);
            padding: 10px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* MAIN LAYOUT */
        .hero-container {
            display: flex;
            min-height: calc(100vh - 80px); /* Full height minus banner */
            flex-wrap: wrap;
        }

        .content-side {
            flex: 1;
            padding: 5% 5%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 400px;
        }

        .image-side {
            flex: 1;
            background: url('jaguar-repair.jpg') center center / cover no-repeat;
            min-height: 400px;
            min-width: 400px;
        }

        /* TYPOGRAPHY */
        h1 {
            font-size: clamp(3rem, 6vw, 4.5rem);
            line-height: 0.9;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .subheadline {
            font-size: 1.8rem;
            color: var(--brand-yellow);
            margin-bottom: 10px;
        }

        .price {
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 30px;
        }

        .price span {
            font-size: 1.2rem;
            font-weight: 400;
            text-transform: lowercase;
        }

        /* BADGES */
        .badge-row {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .badge {
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge-warranty { background: var(--brand-yellow); color: var(--brand-black); }
        .badge-states { background: var(--brand-white); color: var(--brand-black); }

        /* BUTTON */
        .call-btn {
            display: block;
            background-color: var(--brand-yellow);
            color: var(--brand-black);
            text-align: center;
            padding: 25px;
            font-size: 2.5rem;
            font-weight: 900;
            text-decoration: none;
            border-radius: 15px;
            max-width: 500px;
            transition: transform 0.2s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .call-btn:active { transform: scale(0.98); }

        .footer-phone {
            display: block;
            text-align: center;
            max-width: 500px;
            margin-top: 15px;
            font-size: 1.2rem;
            opacity: 0.8;
        }

        /* RESPONSIVE TWEAKS */
        @media (max-width: 768px) {
            .top-banner { flex-direction: column; text-align: center; gap: 15px; }
            .content-side { min-width: 100%; order: 2; }
            .image-side { min-width: 100%; order: 1; min-height: 300px; }
            h1 { font-size: 2.5rem; }
            .price { font-size: 3rem; }
            .call-btn { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <header class="top-banner">
        <div class="banner-text">⚡ PRICE GUARANTEE! WE'LL BEAT ANY WRITTEN!</div>
        <a href="tel:18005550199" class="banner-phone">📞 1-800-555-0199</a>
    </header>

    <main class="hero-container">
        <section class="content-side">
            <h1>Jaguar<br>Convertible<br>Top Repair</h1>
            
            <p class="subheadline">Replace All 6 Hoses & Cylinders</p>
            <div class="price">$4,250 <span>flat rate</span></div>

            <div class="badge-row">
                <div class="badge badge-warranty">🛡️ 5-YEAR WARRANTY</div>
                <div class="badge badge-states">📍 ALL 50 STATES</div>
            </div>

            <a href="tel:18005550199" class="call-btn">📞 CALL NOW</a>
            <span class="footer-phone">1-800-555-0199</span>
        </section>

        <section class="image-side">
            <!-- Background image applied via CSS -->
        </section>
    </main>

</body>
</html>
